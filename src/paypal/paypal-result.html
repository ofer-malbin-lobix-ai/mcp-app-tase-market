<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Subscription - Phenomen Investment - TASE Market</title>
  <script>
    (function() {
      var theme = 'light';
      try {
        var stored = localStorage.getItem('tase-theme');
        if (stored === 'light' || stored === 'dark') { theme = stored; }
        else if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) { theme = 'dark'; }
      } catch(e) {}
      document.documentElement.setAttribute('data-theme', theme);

      var lang = 'en';
      try {
        var storedLang = localStorage.getItem('tase-language');
        if (storedLang === 'he' || storedLang === 'en') lang = storedLang;
      } catch(e) {}
      document.documentElement.setAttribute('dir', lang === 'he' ? 'rtl' : 'ltr');
      document.documentElement.setAttribute('lang', lang);
    })();
  </script>
  <style>
    [data-theme="light"] {
      --t-bg-primary: #ffffff;
      --t-bg-secondary: #f5f5f5;
      --t-bg-tertiary: #eeeeee;
      --t-text-primary: #1a1a1a;
      --t-text-secondary: #666666;
      --t-border: #e5e5e5;
      --t-accent: #2563eb;
      --t-error-bg: #fef2f2;
      --t-error-text: #dc2626;
      --t-success-bg: #f0fdf4;
      --t-success-text: #16a34a;
      --t-warning-bg: #fffbeb;
      --t-warning-text: #d97706;
      --t-info-bg: #eff6ff;
      --t-info-text: #2563eb;
    }

    [data-theme="dark"] {
      --t-bg-primary: #0f172a;
      --t-bg-secondary: #1e293b;
      --t-bg-tertiary: #334155;
      --t-text-primary: #e2e8f0;
      --t-text-secondary: #94a3b8;
      --t-border: #334155;
      --t-accent: #3b82f6;
      --t-error-bg: #450a0a;
      --t-error-text: #fca5a5;
      --t-success-bg: #052e16;
      --t-success-text: #86efac;
      --t-warning-bg: #451a03;
      --t-warning-text: #fcd34d;
      --t-info-bg: #172554;
      --t-info-text: #93c5fd;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: var(--t-bg-primary);
      min-height: 100vh;
      color: var(--t-text-primary);
      padding: 2rem;
    }

    .container {
      max-width: 768px;
      margin: 0 auto;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 2rem;
    }

    .header-left {
      display: flex;
      flex-direction: column;
    }

    h1 {
      font-size: 2rem;
      margin-bottom: 0.25rem;
      background: linear-gradient(135deg, #3b82f6, #8b5cf6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .subtitle {
      color: var(--t-text-secondary);
      font-size: 0.95rem;
    }

    .header-controls {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .theme-toggle, .lang-toggle {
      background: var(--t-bg-secondary);
      border: 1px solid var(--t-border);
      border-radius: 8px;
      width: 36px;
      height: 36px;
      cursor: pointer;
      font-size: 1.1rem;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s;
      flex-shrink: 0;
      color: var(--t-text-primary);
    }

    .lang-toggle {
      font-size: 0.85rem;
      font-weight: 600;
    }

    .theme-toggle:hover, .lang-toggle:hover {
      background: var(--t-bg-tertiary);
    }

    .card {
      background: var(--t-bg-secondary);
      border: 1px solid var(--t-border);
      border-radius: 16px;
      padding: 3rem 2rem;
      text-align: center;
    }

    .icon {
      font-size: 4rem;
      margin-bottom: 1.5rem;
    }

    .icon.success { color: var(--t-success-text); }
    .icon.cancelled { color: var(--t-warning-text); }
    .icon.error { color: var(--t-error-text); }

    .card h1 {
      font-size: 1.8rem;
      margin-bottom: 1rem;
      color: var(--t-text-primary);
      background: none;
      -webkit-background-clip: unset;
      -webkit-text-fill-color: unset;
      background-clip: unset;
    }

    .message {
      color: var(--t-text-secondary);
      font-size: 1.1rem;
      line-height: 1.6;
      margin-bottom: 2rem;
    }

    .plan-badge {
      display: inline-block;
      padding: 0.5rem 1.5rem;
      border-radius: 50px;
      font-weight: 600;
      font-size: 1rem;
      text-transform: uppercase;
      margin-bottom: 1.5rem;
      background: linear-gradient(135deg, #16a34a, #22c55e);
      color: #fff;
    }

    .instructions {
      background: var(--t-info-bg);
      border: 1px solid var(--t-accent);
      border-radius: 8px;
      padding: 1rem;
      margin-top: 1.5rem;
      font-size: 0.95rem;
      color: var(--t-info-text);
    }

    footer {
      margin-top: 3rem;
      padding-top: 1.5rem;
      border-top: 1px solid var(--t-border);
      text-align: center;
      color: var(--t-text-secondary);
      font-size: 0.85rem;
    }

    footer a {
      color: var(--t-accent);
      text-decoration: none;
    }

    footer a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <div class="header-left">
        <h1>Phenomen Investment - TASE Market</h1>
        <p class="subtitle" id="page-subtitle">Subscription</p>
      </div>
      <div class="header-controls">
        <button class="lang-toggle" id="lang-toggle" title="Switch language"></button>
        <button class="theme-toggle" id="theme-toggle" title="Toggle theme"></button>
      </div>
    </header>
    <div class="card">
      <div id="content">
        <!-- Content will be injected by JavaScript -->
      </div>
    </div>
    <footer>
      <p><a href="https://www.lobix.ai" target="_blank">www.lobix.ai</a></p>
      <p style="margin-top: 0.5rem;">
        <a href="/terms" id="footer-terms-link">Terms of Service</a> &middot;
        <a href="/privacy" id="footer-privacy-link">Privacy Policy</a>
      </p>
      <p id="footer-copyright" style="margin-top: 0.5rem;">&copy; 2026 Lobix.AI. All rights reserved.</p>
    </footer>
  </div>

  <script>
    // Theme toggle
    function getTheme() {
      return document.documentElement.getAttribute('data-theme') || 'light';
    }
    function setTheme(t) {
      document.documentElement.setAttribute('data-theme', t);
      try { localStorage.setItem('tase-theme', t); } catch(e) {}
      updateToggleIcon();
    }
    function updateToggleIcon() {
      var btn = document.getElementById('theme-toggle');
      btn.textContent = getTheme() === 'dark' ? '\u2600\uFE0F' : '\uD83C\uDF19';
      btn.title = getTheme() === 'dark' ? 'Switch to light mode' : 'Switch to dark mode';
    }
    document.getElementById('theme-toggle').addEventListener('click', function() {
      setTheme(getTheme() === 'light' ? 'dark' : 'light');
    });
    updateToggleIcon();

    // Translations
    var TEXTS = {
      en: {
        trialActivated: 'Free Trial Activated!',
        subscriptionActivated: 'Subscription Activated!',
        trialBadge: 'Free Trial \u2014 7 Days',
        planBadge: '{plan} Plan',
        trialMessage: 'Your free trial is now active.<br>Enjoy full access to TASE Market for 7 days.',
        subscriptionMessage: 'Thank you for subscribing to TASE Market.<br>Your subscription is now active.',
        fullAccessInstructions: 'You can now use the Tase Market tools with full access.',
        checkoutCancelled: 'Checkout Cancelled',
        cancelledMessage: 'Your subscription checkout was cancelled.<br>No charges have been made.',
        cancelledInstructions: 'You can try again anytime by asking Chat "show the setting widget" to subscribe you to a plan.',
        somethingWrong: 'Something Went Wrong',
        errorMessage: 'There was an issue processing your subscription.<br>Error: {error}',
        errorInstructions: 'Please try again or <a href="mailto:contact@lobix.ai" style="color: var(--t-accent); text-decoration: underline;">contact support</a> if the issue persists.',
        pageNotFound: 'Page Not Found',
        pageNotFoundMessage: 'This page should only be accessed after a PayPal checkout.',
        pageSubtitle: 'Subscription',

        footerTerms: 'Terms of Service',
        footerPrivacy: 'Privacy Policy',
        footerCopyright: '\u00A9 2026 Lobix.AI. All rights reserved.',
        switchLang: 'Switch to \u05E2\u05D1\u05E8\u05D9\u05EA'
      },
      he: {
        trialActivated: '\u05EA\u05E7\u05D5\u05E4\u05EA \u05D4\u05E0\u05D9\u05E1\u05D9\u05D5\u05DF \u05D4\u05D5\u05E4\u05E2\u05DC\u05D4!',
        subscriptionActivated: '\u05D4\u05DE\u05E0\u05D5\u05D9 \u05D4\u05D5\u05E4\u05E2\u05DC!',
        trialBadge: '\u05EA\u05E7\u05D5\u05E4\u05EA \u05E0\u05D9\u05E1\u05D9\u05D5\u05DF \u2014 7 \u05D9\u05DE\u05D9\u05DD',
        planBadge: '\u05DE\u05E1\u05DC\u05D5\u05DC {plan}',
        trialMessage: '\u05EA\u05E7\u05D5\u05E4\u05EA \u05D4\u05E0\u05D9\u05E1\u05D9\u05D5\u05DF \u05E4\u05E2\u05D9\u05DC\u05D4 \u05DB\u05E2\u05EA.<br>\u05E0\u05D4\u05E0\u05D4 \u05DE\u05D2\u05D9\u05E9\u05D4 \u05DE\u05DC\u05D0\u05D4 \u05DC-TASE Market \u05DC\u05DE\u05E9\u05DA 7 \u05D9\u05DE\u05D9\u05DD.',
        subscriptionMessage: '\u05EA\u05D5\u05D3\u05D4 \u05E9\u05E0\u05E8\u05E9\u05DE\u05EA \u05DC-TASE Market.<br>\u05D4\u05DE\u05E0\u05D5\u05D9 \u05E9\u05DC\u05DA \u05E4\u05E2\u05D9\u05DC \u05DB\u05E2\u05EA.',
        fullAccessInstructions: '\u05DB\u05E2\u05EA \u05E0\u05D9\u05EA\u05DF \u05DC\u05D4\u05E9\u05EA\u05DE\u05E9 \u05D1\u05DB\u05DC\u05D9 TASE Market \u05E2\u05DD \u05D2\u05D9\u05E9\u05D4 \u05DE\u05DC\u05D0\u05D4.',
        checkoutCancelled: '\u05D4\u05EA\u05E9\u05DC\u05D5\u05DD \u05D1\u05D5\u05D8\u05DC',
        cancelledMessage: '\u05EA\u05E9\u05DC\u05D5\u05DD \u05D4\u05DE\u05E0\u05D5\u05D9 \u05D1\u05D5\u05D8\u05DC.<br>\u05DC\u05D0 \u05D1\u05D5\u05E6\u05E2 \u05D7\u05D9\u05D5\u05D1.',
        cancelledInstructions: '\u05E0\u05D9\u05EA\u05DF \u05DC\u05E0\u05E1\u05D5\u05EA \u05E9\u05D5\u05D1 \u05D1\u05DB\u05DC \u05E2\u05EA \u05E2\u05DC \u05D9\u05D3\u05D9 \u05D1\u05E7\u05E9\u05D4 \u05DE\u05D4\u05E6\u05F3\u05D0\u05D8 "\u05D4\u05E6\u05D2 \u05D0\u05EA \u05D5\u05D9\u05D3\u05D2\u05F3\u05D8 \u05D4\u05D4\u05D2\u05D3\u05E8\u05D5\u05EA" \u05DC\u05D4\u05D9\u05E8\u05E9\u05DD \u05DC\u05DE\u05E0\u05D5\u05D9.',
        somethingWrong: '\u05DE\u05E9\u05D4\u05D5 \u05D4\u05E9\u05EA\u05D1\u05E9',
        errorMessage: '\u05D0\u05D9\u05E8\u05E2\u05D4 \u05D1\u05E2\u05D9\u05D4 \u05D1\u05E2\u05D9\u05D1\u05D5\u05D3 \u05D4\u05DE\u05E0\u05D5\u05D9.<br>\u05E9\u05D2\u05D9\u05D0\u05D4: {error}',
        errorInstructions: '\u05E0\u05E1\u05D4 \u05E9\u05D5\u05D1 \u05D0\u05D5 <a href="mailto:contact@lobix.ai" style="color: var(--t-accent); text-decoration: underline;">\u05E6\u05D5\u05E8 \u05E7\u05E9\u05E8 \u05E2\u05DD \u05D4\u05EA\u05DE\u05D9\u05DB\u05D4</a> \u05D0\u05DD \u05D4\u05D1\u05E2\u05D9\u05D4 \u05E0\u05DE\u05E9\u05DB\u05EA.',
        pageNotFound: '\u05D4\u05D3\u05E3 \u05DC\u05D0 \u05E0\u05DE\u05E6\u05D0',
        pageNotFoundMessage: '\u05D3\u05E3 \u05D6\u05D4 \u05E0\u05D2\u05D9\u05E9 \u05E8\u05E7 \u05DC\u05D0\u05D7\u05E8 \u05EA\u05E9\u05DC\u05D5\u05DD \u05D1-PayPal.',
        pageSubtitle: '\u05DE\u05E0\u05D5\u05D9',
        footerTerms: '\u05EA\u05E0\u05D0\u05D9 \u05E9\u05D9\u05DE\u05D5\u05E9',
        footerPrivacy: '\u05DE\u05D3\u05D9\u05E0\u05D9\u05D5\u05EA \u05E4\u05E8\u05D8\u05D9\u05D5\u05EA',
        footerCopyright: '\u00A9 2026 Lobix.AI. \u05DB\u05DC \u05D4\u05D6\u05DB\u05D5\u05D9\u05D5\u05EA \u05E9\u05DE\u05D5\u05E8\u05D5\u05EA.',
        switchLang: 'Switch to English'
      }
    };

    var currentLang = document.documentElement.getAttribute('lang') || 'en';

    function T(key) {
      return TEXTS[currentLang][key] || TEXTS['en'][key] || key;
    }

    function setLanguage(lang) {
      currentLang = lang;
      document.documentElement.setAttribute('dir', lang === 'he' ? 'rtl' : 'ltr');
      document.documentElement.setAttribute('lang', lang);
      try { localStorage.setItem('tase-language', lang); } catch(e) {}
      window.dispatchEvent(new CustomEvent('tase-language-change', { detail: lang }));
      updateLangToggle();
      renderContent();
    }

    function updateLangToggle() {
      var btn = document.getElementById('lang-toggle');
      btn.textContent = currentLang === 'en' ? '\u05E2\u05D1' : 'EN';
      btn.title = T('switchLang');
    }

    document.getElementById('lang-toggle').addEventListener('click', function() {
      setLanguage(currentLang === 'en' ? 'he' : 'en');
    });

    window.addEventListener('tase-language-change', function(e) {
      var lang = e.detail;
      if (lang !== currentLang && (lang === 'en' || lang === 'he')) {
        setLanguage(lang);
      }
    });

    updateLangToggle();

    const urlParams = new URLSearchParams(window.location.search);
    const contentDiv = document.getElementById('content');

    function renderContent() {
      // Update subtitle
      document.getElementById('page-subtitle').textContent = T('pageSubtitle');

      // Update footer
      document.getElementById('footer-terms-link').textContent = T('footerTerms');
      document.getElementById('footer-privacy-link').textContent = T('footerPrivacy');
      document.getElementById('footer-copyright').textContent = T('footerCopyright');

      if (urlParams.get('success') === 'true') {
        const plan = urlParams.get('plan') || 'subscription';
        const isTrial = plan === 'trial';
        contentDiv.innerHTML = `
          <div class="icon success">&#10004;</div>
          <h1>${isTrial ? T('trialActivated') : T('subscriptionActivated')}</h1>
          <div class="plan-badge">${isTrial ? T('trialBadge') : T('planBadge').replace('{plan}', plan)}</div>
          <p class="message">
            ${isTrial ? T('trialMessage') : T('subscriptionMessage')}
          </p>
          <div class="instructions">
            ${T('fullAccessInstructions')}
          </div>
        `;
      } else if (urlParams.get('cancelled') === 'true') {
        contentDiv.innerHTML = `
          <div class="icon cancelled">&#10006;</div>
          <h1>${T('checkoutCancelled')}</h1>
          <p class="message">
            ${T('cancelledMessage')}
          </p>
          <div class="instructions">
            ${T('cancelledInstructions')}
          </div>
        `;
      } else if (urlParams.get('error')) {
        const error = urlParams.get('error').replace(/_/g, ' ');
        const status = urlParams.get('status');
        const errorText = status ? T('errorMessage').replace('{error}', error) + ` (Status: ${status})` : T('errorMessage').replace('{error}', error);
        contentDiv.innerHTML = `
          <div class="icon error">&#9888;</div>
          <h1>${T('somethingWrong')}</h1>
          <p class="message">
            ${errorText}
          </p>
          <div class="instructions">
            ${T('errorInstructions')}
          </div>
        `;
      } else {
        contentDiv.innerHTML = `
          <div class="icon">&#128269;</div>
          <h1>${T('pageNotFound')}</h1>
          <p class="message">
            ${T('pageNotFoundMessage')}
          </p>
        `;
      }
    }

    renderContent();
  </script>
</body>
</html>
