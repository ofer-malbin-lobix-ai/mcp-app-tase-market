    var currentLang = document.documentElement.getAttribute('lang') || 'en';

    function T(key) {
      return TEXTS[currentLang][key] || TEXTS['en'][key] || key;
    }

    function setLanguage(lang) {
      currentLang = lang;
      document.documentElement.setAttribute('dir', lang === 'he' ? 'rtl' : 'ltr');
      document.documentElement.setAttribute('lang', lang);
      try { localStorage.setItem('tase-language', lang); } catch(e) {}
      window.dispatchEvent(new CustomEvent('tase-language-change', { detail: lang }));
      updateLangToggle();
      applyLanguage();
    }

    function updateLangToggle() {
      var btn = document.getElementById('lang-toggle');
      btn.textContent = currentLang === 'en' ? '\u05E2\u05D1' : 'EN';
      btn.title = T('switchLang');
    }

    document.getElementById('lang-toggle').addEventListener('click', function() {
      setLanguage(currentLang === 'en' ? 'he' : 'en');
    });

    window.addEventListener('tase-language-change', function(e) {
      var lang = e.detail;
      if (lang !== currentLang && (lang === 'en' || lang === 'he')) {
        setLanguage(lang);
      }
    });

    function renderSections() {
      var sections = TEXTS[currentLang].sections;
      var html = '';
      for (var i = 0; i < sections.length; i++) {
        html += '<div class="section"><h2>' + sections[i].title + '</h2>' + sections[i].content + '</div>';
      }
      document.getElementById('content').innerHTML = html;
    }

    function applyLanguage() {
      document.getElementById('page-title').textContent = T('pageTitle');
      document.getElementById('page-subtitle').textContent = T('pageSubtitle');
      document.getElementById('last-updated').textContent = T('lastUpdated');
      document.getElementById('footer-terms-link').textContent = T('footerTerms');
      document.getElementById('footer-privacy-text').textContent = T('footerPrivacy');
      document.getElementById('footer-copyright').textContent = T('footerCopyright');
      document.title = T('pageTitle') + ' - Phenomen Investment - TASE Market';
      renderSections();
    }

    updateLangToggle();
    applyLanguage();
  </script>
